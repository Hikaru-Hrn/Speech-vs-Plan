<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>SPEECH-VS-PLAN</title>
    <style>
        @font-face {
            font-family: 'Schiffbauer';
            src: url('../fonts/Schiffbauer-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Schiffbauer', sans-serif;
            background-color: #f5f5f5;
            padding-top: 120px;
            padding-bottom: 50px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 700px;
            padding: 0 20px;
        }

        h1.main-title {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 48pt;
            width: 100%;
        }

        p {
            text-align: center;
            font-size: 20px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .drop-zone {
            border: 2px solid #333;
            border-radius: 20px;
            padding: 40px 30px;
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        .drop-zone.dragover {
            background-color: #eaeaea;
        }

        .drop-zone p {
            margin: 0;
            font-size: 18px;
            color: #555;
            max-width: 100%;
        }

        .drop-zone .file-list {
            margin-top: 15px;
            font-size: 16px;
            color: #333;
            word-break: break-all;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Загрузка плана лекций</h1>
        <p>Здесь вы можете загрузить ваш файл с планом лекции. Для этого выберите файл или перетащите его.</p>

        <div id="dropContainer" class="drop-zone">
            <p id="dropMessage">Зона для загрузки файлов. Поддерживаются файлы с расширением .md, .txt и .docx.</p>
            <div id="fileList" class="file-list"></div>
            <input type="file" id="fileInput" multiple hidden>
        </div>
    </div>

    <script>
        (function() {
            const fileInput = document.getElementById('fileInput');
            const dropContainer = document.getElementById('dropContainer');
            const dropMessage = document.getElementById('dropMessage');
            const fileList = document.getElementById('fileList');

            const originalText = dropMessage.textContent;

            function openFileDialog() {
                fileInput.click();
            }

            dropContainer.addEventListener('click', openFileDialog);

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                document.addEventListener(eventName, preventDefaults, false);
                dropContainer.addEventListener(eventName, preventDefaults, false);
            });

            dropContainer.addEventListener('dragenter', function() {
                dropContainer.classList.add('dragover');
            });

            dropContainer.addEventListener('dragover', function() {
                dropContainer.classList.add('dragover');
            });

            dropContainer.addEventListener('dragleave', function(e) {
                const related = e.relatedTarget;
                if (!dropContainer.contains(related)) {
                    dropContainer.classList.remove('dragover');
                }
            });

            dropContainer.addEventListener('drop', function(e) {
                dropContainer.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFiles(files);
                }
            });

            fileInput.addEventListener('change', function() {
                if (fileInput.files.length > 0) {
                    handleFiles(fileInput.files);
                } else {
                    dropMessage.textContent = originalText;
                    fileList.textContent = '';
                }
            });

            function handleFiles(files) {
                const fileNames = Array.from(files).map(f => f.name);
                fileList.textContent = 'Выбрано: ' + fileNames.join(', ');
                const dataTransfer = new DataTransfer();
                for (let i = 0; i < files.length; i++) {
                    dataTransfer.items.add(files[i]);
                }
                fileInput.files = dataTransfer.files;

                console.log('Загружены файлы:', fileNames);
            }

            document.addEventListener('dragleave', function(e) {
                if (e.relatedTarget === null) {
                    dropContainer.classList.remove('dragover');
                }
            });

        })();
    </script>
</body>
</html>
