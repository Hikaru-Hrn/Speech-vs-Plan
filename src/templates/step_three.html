<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>SPEECH-VS-PLAN</title>
    <style>
              @font-face {
            font-family: 'Schiffbauer';
            src: url('../fonts/Schiffbauer-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }

        body {
          margin: 0;
          padding: 0;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          min-height: 100vh;
          font-family: 'Schiffbauer', sans-serif;
          background-color: #f5f5f5;
          padding-top: 200px;
          padding-bottom: 50px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 700px;
            padding: 0 20px;
        }

        h1.step-number {
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 30pt;
            color: #666;
            font-weight: normal;
        }

        h1.main-title {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 48pt;
            width: 100%;
        }

        p {
            text-align: center;
            font-size: 20px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .buttons-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 25px;
            flex-wrap: nowrap;
        }

        button {
            text-align: center;
            width: 300px;
            height: 55px;
            margin: 0;
            font-size: 25px;
            font-family: 'Schiffbauer', sans-serif;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            flex-shrink: 0;
        }

        button:hover {
            background-color: #555;
        }

        button:active {
            transform: scale(0.97);
        }

        button.primary-btn {
            background-color: #333;
            color: #fff;
            border: none;
        }

        button.primary-btn:hover {
            background-color: #555;
        }

        /* Стиль для кнопки "Сравнить" — выше и такого же цвета */
        .compare-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 25px;
        }

        button.compare-btn {
            width: 300px;
            height: 65px; /* Чуть выше остальных */
            font-size: 28px;
            background-color: #333; /* Такой же цвет, как у других кнопок */
            color: #fff;
        }

        button.compare-btn:hover {
            background-color: #555;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="step-number">Шаг 3</h1>
      <h1 class="main-title">Сравнение</h1>
      <p>Все готово для сравнения плана и речи. Это как раз можно сделать на 3 шаге. Вам нужно только нажать на кнопку "Сравнить" и выбрать, что делать дальше выгружать его или смотерть в браузере.</p>
      
      <!-- Кнопка "Сравнить" — выше остальных -->
      <div class="compare-wrapper">
          <button type="button" class="compare-btn">Сравнить</button>
      </div>
      
      <div class="buttons-row">
          <button type="button">Посмотреть в браузере</button>
          <button type="submit" class="primary-btn">Загрузить файл</button>
      </div>
    </div>
  </body>
</html>
