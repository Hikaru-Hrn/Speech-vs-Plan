<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>SPEECH-VS-PLAN</title>
    <link rel="stylesheet" href="./../css/upload_audio.css">
    <script src="./../js/upload_audio.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Загрузка конвентированного файла</h1>
        <p>Здесь вы можете загрузить уже конвентированный файл.</p>

        <div id="dropContainer" class="drop-zone">
            <p id="dropMessage">Зона для загрузки файлов. Поддерживаются файлы с расширением .waw.</p>
            <div id="fileList" class="file-list"></div>
            <input type="file" id="fileInput" multiple hidden>
        </div>
        <div class="buttons-row">
            <button type="button">Отправить</button>
            <button type="submit" class="primary-btn">Назад</button>
        </div>
    </div>
</body>
</html>
