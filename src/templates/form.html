<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>SPEECH-VS-PLAN</title>
    <style>
        @font-face {
          font-family: 'Schiffbauer';
          src: url('../fonts/Schiffbauer-Regular.otf') format('opentype');
          font-weight: normal;
          font-style: normal;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Schiffbauer', sans-serif;
            background-color: #f5f5f5;
            padding-top: 50px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 450px;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 26px;
            width: 100%;
        }

        .stage-block {
            border: 2px solid black;
            border-radius: 20px;
            padding: 25px 30px;
            background-color: white;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .stage-block h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
        }

        .stage-block div {
            margin-bottom: 18px;
        }

        .stage-block div:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: normal;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .buttons-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 0;
            gap: 20px;
        }

        button {
            font-family: 'Schiffbauer', sans-serif;
            padding: 10px 28px;
            border: 2px solid #333;
            background-color: #fff;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            min-width: 140px;
            text-align: center;
        }

        button:hover {
            background-color: #e6e6e6;
        }

        button:active {
            transform: scale(0.97);
        }

        #submitBtn {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }

        #submitBtn:hover {
            background-color: #555;
        }

        .delete-btn {
            background-color: #fff;
            border: 2px solid #cc0000;
            color: #cc0000;
            min-width: 120px;
            padding: 8px 20px;
            font-size: 14px;
            width: 100%;
        }

        .delete-btn:hover {
            background-color: #cc0000;
            color: #fff;
        }

        .stages-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .delete-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="width: 100%;">
            <h1>План лекции</h1>

            <div class="buttons-row">
                <button type="button" id="addStageBtn">Добавить этап</button>
                <button type="submit" id="submitBtn">Отправить</button>
            </div>
        </div>

        <div id="stagesContainer" class="stages-container">
        </div>
    </div>

<script>
      let count = 0;
      const addStageBtn = document.getElementById('addStageBtn');
      const stagesContainer = document.getElementById('stagesContainer');

      function renumberStages() {
        const stages = stagesContainer.querySelectorAll('.stage-block');
        stages.forEach((stage, index) => {
          const newNumber = index + 1;
          const title = stage.querySelector('h3');
          if (title) {
            title.textContent = `Этап ${newNumber}`;
          }
          const inputs = stage.querySelectorAll('input, textarea');
          inputs.forEach(input => {
            const name = input.getAttribute('name');
            if (name) {
              const newName = name.replace(/\d+$/, newNumber);
              input.setAttribute('name', newName);
            }
          });
          const deleteBtn = stage.querySelector('.delete-btn');
          if (deleteBtn) {
            deleteBtn.setAttribute('data-stage-id', newNumber);
          }
        });
        count = stages.length;
      }

      addStageBtn.addEventListener('click', function(){
        count++;
        const block = document.createElement('div');
        block.className = 'stage-block';
        block.innerHTML = `
                <h3>Этап ${count}</h3>
                <div>
                    <label>Название этапа:</label>
                    <input type="text" name="stageName${count}" placeholder="Введите название этапа">
                </div>
                <div>
                    <label>Длительность:</label>
                    <input type="text" name="stageTime${count}" placeholder="Введите длительность, например 12:00-12:15">
                </div>
                <div>
                    <label>Описание этапа:</label>
                    <textarea name="stageDescription${count}" placeholder="Введите описание этапа"></textarea>
                </div>
                <div class="delete-wrapper">
                  <button class="delete-btn" data-stage-id="${count}">🗑 Удалить этап</button>
                </div>
            `;
        stagesContainer.appendChild(block);
        
        const deleteBtn = block.querySelector('.delete-btn');
        deleteBtn.addEventListener('click', function(e){
          const stageBlock = this.closest('.stage-block');
          if(stageBlock){
            stageBlock.remove();
            renumberStages();
          }
        });
      });

      document.getElementById('submitBtn').addEventListener('click', async function() {
        const stages = stagesContainer.querySelectorAll('.stage-block');
        if (stages.length === 0) {
          alert('Добавьте хотя бы один этап!');
          return;
        }
        
        const lecturePlan = [];

        stages.forEach((stage, index) => {
          const stageNum = index + 1;
          const nameInput = stage.querySelector(`input[name="stageName${stageNum}"]`);
          const timeInput = stage.querySelector(`input[name="stageTime${stageNum}"]`);
          const descInput = stage.querySelector(`textarea[name="stageDescription${stageNum}"]`);

          lecturePlan.push({
            stage_number: stageNum,
            name: nameInput ? nameInput.value : '',
            time: timeInput ? timeInput.value : '',
            description: descInput ? descInput.value : ''
          });
        });

        try {
          const response = await fetch('/lectures/add', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(lecturePlan)
          });

          if (response.ok) {
            const result = await response.json();
            alert(`Успешно! ${result.message}`);
          } else {
            alert('Ошибка сервера при сохранении.');
          }
        } catch (error) {
          console.error('Ошибка:', error);
          alert('Не удалось связаться с сервером.');
        }
      });
    </script>
</body>
</html>
