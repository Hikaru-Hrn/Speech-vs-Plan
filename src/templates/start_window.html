<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>SPEECH-VS-PLAN</title>
    <style>
      @font-face {
        font-family: 'Schiffbauer';
        src: url('../fonts/Schiffbauer-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
      }
      body{
        text-align: center;
        font-family: 'Schiffbauer', sans-serif;
        background-color: #f5f5f5;
      }
      h1{
        padding-top: 200px;
        padding-bottom: 20px;
        font-size: 48pt;
      }
      .desc {
        width: 800px;
        margin: 0 auto 30px;
        font-size: 20px;
        line-height: 1.6;
        color: #444;
      }
      button {
        text-align: center;
        width: 350px;
        height: 55px;
        margin-top: 50px;
        font-size: 30px;
        font-family: 'Schiffbauer', sans-serif;
        background-color: #333;
        color: #fff;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.1s ease;
      }

      button:hover {
        background-color: #555;
      }

      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <h1>SPEECH-VS-PLAN</h1>
    <p class="desc">Этот модуль предназначен для сравнения запланированного содержания лекции с тем что было реально сказано. Его задача – выделить пропущенные пункты плана, новые темы возникшие спонтанно, и наметить последующие действия (тесты, задания, методички) на основе фактической речи.</p>
    <button>Погнали!</button>
  </body>
</html>
